---
name: Build deb package

on:
  push:
    tags:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "package=${TAG%%/*}" >> "$GITHUB_OUTPUT"
          echo "release=${TAG##*/}" >> "$GITHUB_OUTPUT"

      - name: Build with docker
        uses: addnab/docker-run-action@v3
        with:
          image: debian:bookworm-slim
          options: -v ${{ github.workspace }}:/github/workspace -w /github/workspace
          run: |
            apt-get update
            apt-get install --no-install-recommends -y ca-certificates curl fakeroot build-essential debhelper dpkg-dev
            chmod +x build.sh
            ./build.sh ${{ steps.tag.outputs.package }} ${{ steps.tag.outputs.release }}

      - name: Find .deb
        id: deb
        run: echo "file=$(ls packages/*.deb)" >> "$GITHUB_OUTPUT"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.package }} ${{ steps.tag.outputs.release }}"
          files: ${{ steps.deb.outputs.file }}
          body_path: "packages/${{ steps.tag.outputs.package }}/debian/changelog"
